<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4 mx-auto">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">

          <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill text-warning" style="font-size:2.5rem;"></i>
            <h1 class="h4 fw-bold mt-2 mb-1">Password Reset Required</h1>
            <p class="text-muted small">You must set a new password before continuing.</p>
          </div>

          {{if .Error}}
          <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
            <span>{{.Error}}</span>
          </div>
          {{end}}

          <form method="POST" action="/account/change-password" novalidate>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="new_password">New Password</label>
              <input
                class="form-control"
                type="password"
                id="new_password"
                name="new_password"
                autocomplete="new-password"
                minlength="12"
                required
                autofocus>
              <div class="form-text">Minimum 12 characters.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="confirm_password">Confirm Password</label>
              <input
                class="form-control"
                type="password"
                id="confirm_password"
                name="confirm_password"
                autocomplete="new-password"
                minlength="12"
                required>
            </div>

            <div class="mt-4">
              <button class="btn btn-warning w-100 fw-semibold" type="submit">
                Set New Password
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
