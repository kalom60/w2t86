<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{if .Title}}{{.Title}} — {{end}}District Materials Portal</title>
  <link rel="stylesheet" href="/static/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">
  {{embed}}
  <script src="/static/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/htmx.min.js"></script>
  <script defer src="/static/js/alpine.min.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    // CSRF protection — mirrors the injection logic in layouts/base.html.
    function getCsrfToken() {
      var match = document.cookie.match(/(?:^|; )csrf_token=([^;]*)/);
      return match ? decodeURIComponent(match[1]) : '';
    }
    // HTMX requests: inject X-Csrf-Token header on every mutating request.
    document.body.addEventListener('htmx:configRequest', function(e) {
      var method = (e.detail.verb || '').toUpperCase();
      if (method !== 'GET' && method !== 'HEAD' && method !== 'OPTIONS') {
        e.detail.headers['X-Csrf-Token'] = getCsrfToken();
      }
    });
    // Standard HTML form submissions: inject hidden csrf_token field so that
    // non-HTMX forms (e.g. admin/users/new) also pass the CSRF check.
    document.addEventListener('submit', function(e) {
      var form = e.target;
      if (form.method && form.method.toUpperCase() !== 'GET' &&
          !form.querySelector('[name="csrf_token"]')) {
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'csrf_token';
        input.value = getCsrfToken();
        form.appendChild(input);
      }
    });
  </script>
</body>
</html>
